<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING CYBER PLATFORM v4.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body {
            background-color: #010401;
            color: #00ff66;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px 0;
        }

        /* شاشة التحميل (Loading Screen) الفائقة */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .loader-terminal {
            width: 90%;
            max-width: 500px;
            color: #00ff66;
            font-size: 14px;
            text-align: left;
            direction: ltr;
            margin-bottom: 20px;
        }
        .load-bar-container {
            width: 250px;
            height: 4px;
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid #00ff66;
            position: relative;
            overflow: hidden;
        }
        .load-bar {
            width: 0%;
            height: 100%;
            background: #00ff66;
            box-shadow: 0 0 15px #00ff66;
            animation: loadProgress 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        /* خلفية الماتريكس الحية */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.12;
            pointer-events: none;
        }

        /* شاشة الزجاج CRT والـ Scanlines */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
            background-size: 100% 4px;
            z-index: 999;
            pointer-events: none;
        }

        /* الحاوية الرئيسية مع الأنيميشن المحيطي للنيون */
        .cyber-panel {
            position: relative;
            z-index: 5;
            width: 92%;
            max-width: 450px;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            border: 2px solid #00ff66;
            animation: neonGlowPulse 4s infinite ease-in-out;
        }

        /* نظام الترويسة وخط النظام */
        .panel-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            opacity: 0.8;
            border-bottom: 1px dashed rgba(0, 255, 102, 0.2);
            padding-bottom: 10px;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* الهيدر الحيوي - استدعاء صورة النينجا والجمجمة الواقعية المباشرة */
        .dynamic-scene {
            position: relative;
            width: 100%;
            height: 250px;
            background-color: #000;
            /* تم ربط الصورة الواقعية المطلوبة مباشرة بدقة عالية */
            background-image: url('https://raw.githubusercontent.com/Z-Eye-Project/Assets/main/king_skull_ninja.png');
            background-size: cover;
            background-position: center;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid rgba(0, 255, 102, 0.5);
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0, 255, 102, 0.4), 0 0 15px rgba(0, 255, 102, 0.3);
            animation: scenePulse 3s infinite alternate ease-in-out;
        }

        /* تأثير وهج ناري أخضر إضافي فوق الصورة للواقعية */
        .dynamic-scene::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0, 30, 10, 0.7) 90%);
            pointer-events: none;
        }

        /* نصوص العناوين والنظام مع Typing Animation */
        .title-container h1 {
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px #00ff66, 0 0 30px #00ff66;
            letter-spacing: 5px;
            display: inline-block;
            overflow: hidden;
            border-right: 2px solid #00ff66;
            white-space: nowrap;
            margin: 10px 0;
            animation: typingText 2.5s steps(10, end) forwards, blinkCursor 0.6s step-end infinite;
        }
        
        .sub-title {
            font-size: 14px;
            font-weight: bold;
            color: #00ff66;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .status-badge {
            font-size: 11px;
            background: rgba(0, 255, 102, 0.05);
            border: 1px dashed rgba(0, 255, 102, 0.4);
            padding: 6px 16px;
            display: inline-block;
            margin-bottom: 25px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* مصفوفة الأزرار التفاعلية والاهتزاز الـ Hover */
        .action-matrix {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .cyber-btn {
            display: block;
            width: 100%;
            background: rgba(2, 8, 2, 0.9);
            border: 1.5px solid #00ff66;
            border-radius: 12px;
            padding: 16px;
            color: #00ff66;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            position: relative;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
        }

        .cyber-btn::before, .cyber-btn::after {
            content: ""; position: absolute; width: 8px; height: 8px; border-color: #00ff66; border-style: solid;
        }
        .cyber-btn::before { top: -1.5px; left: -1.5px; border-width: 1.5px 0 0 1.5px; }
        .cyber-btn::after { bottom: -1.5px; right: -1.5px; border-width: 0 1.5px 1.5px 0; }

        .cyber-btn span {
            display: block;
            font-size: 9px;
            color: #ffffff;
            opacity: 0.4;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* الاهتزاز واللمعان العالي عند الـ Hover */
        .cyber-btn:hover {
            background: #00ff66;
            color: #000;
            box-shadow: 0 0 30px #00ff66;
            animation: btnShineGlitch 0.2s infinite linear;
        }
        .cyber-btn:hover span {
            color: #000; opacity: 0.8; font-weight: bold;
        }

        /* نافذة الهدية المنبثقة التفاعلية */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.94);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(6px);
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .popup-box {
            background: #020702;
            border: 2px solid #ff003c;
            padding: 35px 25px;
            width: 88%; max-width: 390px;
            text-align: center;
            border-radius: 16px;
            box-shadow: 0 0 35px rgba(255, 0, 60, 0.4);
            position: relative;
        }
        .popup-box h2 { color: #ff003c; margin-bottom: 12px; font-size: 20px; text-shadow: 0 0 10px #ff003c; }
        .popup-box p { color: #fff; font-size: 13px; line-height: 1.6; margin-bottom: 25px; }
        .popup-btn {
            background: #ff003c; color: #fff; border: none; padding: 12px 28px;
            font-weight: bold; cursor: pointer; border-radius: 6px; box-shadow: 0 0 15px #ff003c;
        }

        /* تذييل الصفحة */
        .footer-credits {
            margin-top: 30px;
            font-size: 10px;
            color: #00441a;
            font-weight: bold;
            border-top: 1px solid rgba(0, 255, 102, 0.08);
            padding-top: 12px;
        }

        /* مسارات الأنيميشن الكاملة للحركة والـ Neon و الـ Glitch */
        @keyframes loadProgress { to { width: 100%; } }
        @keyframes blinkCursor { from, to { border-color: transparent } 50% { border-color: #00ff66; } }
        @keyframes typingText { from { width: 0 } to { width: 140px } }
        @keyframes neonGlowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 102, 0.2); border-color: #00ff66; }
            50% { box-shadow: 0 0 40px rgba(0, 255, 102, 0.5); border-color: #00ffaa; }
        }
        
        /* أنيميشن تنفس ونبض الصورة الواقعية للهيدر */
        @keyframes scenePulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(0,255,102,0.2)) saturate(1); }
            100% { transform: scale(1.02); filter: drop-shadow(0 0 15px rgba(0,255,102,0.5)) saturate(1.2); }
        }

        @keyframes btnShineGlitch {
            0% { transform: translate(0) skew(0deg); }
            20% { transform: translate(-1px, 1px) skew(-1deg); }
            40% { transform: translate(1px, -1px) skew(1deg); }
            60% { transform: translate(-1px, -1px) skew(0deg); }
            80% { transform: translate(1px, 1px) skew(1deg); }
            100% { transform: translate(0) skew(0deg); }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-terminal" id="terminal-text"></div>
        <div class="load-bar-container"><div class="load-bar"></div></div>
    </div>

    <div class="scanlines"></div>
    <canvas id="matrix-canvas"></canvas>

    <div class="cyber-panel">
        <div class="panel-header">
