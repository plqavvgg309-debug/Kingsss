<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة KING السيبرانية</title>
    <meta name="description" content="المنصة السيبرانية الرسمية للورد زايرو - تصفح الأدوات والبوتات المتاحة">
    <meta name="keywords" content="منصة king السيبرانية, king-zyros, اللورد زايرو, بوت كينج">
    <style>
        /* هندسة النظام المظلم وتصفير الأبعاد */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #030305;
            color: #ffffff;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* سيرفر الجزيئات المتحركة بالخلفية */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* حاوية المنصة الملكية المتوهجة */
        .cyber-card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 440px;
            background: rgba(8, 8, 12, 0.9);
            border: 2px solid #ff003c;
            border-radius: 16px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.25), inset 0 0 20px rgba(255, 0, 60, 0.1);
            backdrop-filter: blur(12px);
            border-image: linear-gradient(to bottom, #ff003c, #70001d) 1;
        }

        /* شعار الجمجمة النيون */
        .cyber-logo {
            font-size: 55px;
            margin-bottom: 15px;
            animation: glitchPulse 2.5s infinite alternate;
            display: inline-block;
        }

        /* عنوان المنصة الرئيسي */
        .cyber-title {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        /* العنوان الفرعي الناري */
        .cyber-subtitle {
            font-size: 13px;
            color: #ff003c;
            margin-bottom: 35px;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* منظومة الأزرار الهجومية */
        .btn-matrix {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .cyber-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            background: rgba(255, 0, 60, 0.02);
            border: 1px solid #ff003c;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* تأثير التوهج عند تمرير الإصبع أو الماوس */
        .cyber-btn:hover {
            background: #ff003c;
            color: #000000;
            box-shadow: 0 0 25px #ff003c;
            transform: translateY(-4px);
            font-weight: 900;
        }

        /* تذييل الصفحة وحقوق اللورد */
        .cyber-footer {
            margin-top: 40px;
            font-size: 10px;
            color: #555566;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* أنيميشن النبض النيوني للوجو */
        @keyframes glitchPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(255, 0, 60, 0.5)); }
            100% { transform: scale(1.08); filter: drop-shadow(0 0 25px rgba(255, 0, 60, 0.9)); }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="cyber-card">
        <div class="cyber-logo">☠️</div>
        <h1 class="cyber-title">🥷 KING 🥷</h1>
        <p class="cyber-subtitle">المنصة السيبرانية الرسمية للورد زايرو</p>

        <div class="btn-matrix">
            <a href="https://t.me/King1500hackBOT" target="_blank" class="cyber-btn">
                🤖 تشغيل بوت المساعد الملكي
            </a>
            <a href="https://t.me/FXK_I" target="_blank" class="cyber-btn">
                👑 التواصل المباشر مع اللورد
            </a>
        </div>

        <div class="cyber-footer">
            © 2026 ZYROS MATRIX. DEVELOPMENT BY LORD ZAYROS.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 90, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ff003c" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 140, "color": "#ff003c", "opacity": 0.25, "width": 1 },
                "move": { "enable": true, "speed": 2.5, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "repulse" }, "onclick": { "enable": true, "mode": "push" } },
                "modes": { "repulse": { "distance": 90, "duration": 0.4 }, "push": { "particles_nb": 4 } }
            }
        });
    </script>
</body>
</html>
